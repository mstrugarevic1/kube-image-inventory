<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kubernetes Image Inventory{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="brand">Kubernetes Image Inventory</a>
            <div class="nav-links">
                <form method="post" action="/refresh" id="refresh-form">
                    <input type="hidden" name="cluster" value="{{ selected_cluster | default('all') }}">
                    <button type="submit" class="btn" id="refresh-btn">
                        <svg class="icon" id="refresh-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                        Refresh
                    </button>
                </form>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            {% if request.query_params.get('refresh') == 'busy' %}
            <div class="notice notice-info">A refresh is already in progress. Try again shortly.</div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Kubernetes Image Inventory - Lightweight Cluster Visualizer</p>
        </div>
    </footer>

    <script>
        document.getElementById('refresh-form').addEventListener('submit', function() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('disabled');
            btn.disabled = true;
            document.getElementById('refresh-icon').classList.add('animate-spin');
        });
    </script>
</body>
</html>
